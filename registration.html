<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <a href="loginform.html">Login</a>
    <title>College Management Portal</title>
   
</head>
<body>

    <div id="registerPage" class="card">
        <h2>Register</h2>
        <form id="regForm" >
            <input type="text" id="regUser" placeholder="Username" required><br><br>
            <input type="email" id="regEmail" placeholder="Email" required><br><br>
            <input type="password" id="regPass" placeholder="Password" required minlength="6"><br><br>
            <input type="radio" name="gender" value="Male" checked> Male<br><br>
            <input type="radio" name="gender" value="Female"> Female<br><br>
            <input type="text" id="regRoll" placeholder="Roll No" required><br><br>
            <input type="text" id="regBranch" placeholder="Branch" required><br><br>
            <input type="text" id="regSection" placeholder="Section" required><br><br>
            <button type="submit">Register</button>
        </form>
    </div>

    <script>
        
        document.getElementById('regForm').addEventListener('submit', (e) => {
            e.preventDefault();
            localStorage.setItem('user', JSON.stringify({}));
        });

        document.getElementById('regForm').addEventListener('submit',(e) =>{
            e.preventDefault();
            localStorage.getElementById('name','rollno','branch','sec');
        });
    </script>
</body>
</html>
