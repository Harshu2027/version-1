<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Add Student</title>
</head>
<body>
    <nav>
        <a href="dashboard.html">Dashboard</a> |
        <a href="edit-student.html">Edit Student</a> |
        <a href="view-student.html">View Students</a> |
        <a href="logout.html">Logout</a>
    </nav>

    <div id="addstudent" class="card" style="margin-top: 20px;">
        <h2>Add Student</h2>
        <form id="addStudentForm">
            <label for="studentName">Name:</label>
            <input id="studentName" type="text" placeholder="Enter the Name" required><br><br>
            <label for="studentRoll">Roll No:</label>
            <input id="studentRoll" type="text" placeholder="Enter Roll No" required><br><br>
            <label for="studentBranch">Branch:</label>
            <input id="studentBranch" type="text" placeholder="Enter Branch" required><br><br>
            <button type="submit">Save Student</button>
        </form>
        <p id="addMessage" style="color:green; font-size:0.9rem;"></p>
    </div>

    <script>
        const user = JSON.parse(localStorage.getItem('user') || 'null');
        const loggedIn = localStorage.getItem('loggedIn') === 'true';
        if (!user || !loggedIn) {
            window.location.href = 'loginform.html';
        }

        document.getElementById('addStudentForm').addEventListener('submit', function (e) {
            e.preventDefault();
            const students = JSON.parse(localStorage.getItem('students') || '[]');
            students.push({
                name: document.getElementById('studentName').value.trim(),
                roll: document.getElementById('studentRoll').value.trim(),
                branch: document.getElementById('studentBranch').value.trim()
            });
            localStorage.setItem('students', JSON.stringify(students));
            document.getElementById('addMessage').textContent = 'Student added successfully.';
            e.target.reset();
        });
    </script>
</body>
</html>
