<!DOCTYPE html>
<html lang="en">
<head>

    <link rel="stylesheet" href="styles.css">

<body>
    <nav>
        <a href="index.html">Home</a>
        <a href="dashboard.html">Dashboard</a> 
        <a href="edit-student.html">Edit Student</a> 
        <a href="logout.html">Logout</a>

    <div id="viewStudentsPage" class="card" style="width: 500px; margin-top: 20px;">
        <h2>View Students</h2>
        <div id="studentsList"></div>
    </div>

    <script>
        const students = [
            { name: 'Hema', rollNo: '23B81A05L0' },
            { name: 'Laxmi', rollNo: '23B81A05L1' },
            { name: 'Passi', rollNo: '23B81A05L2' },
            { name:'Siri',   rollNo: '23B81A05L3'},
            {name:'Vidya', rollNo: '23B81A05L4'},
            {name:'Sowmya', rollNo: '23B81A05L5'},
            {name:'Harshini', rollNo: '23B81A05L6'}
        ];

        const studentsList = document.getElementById('studentsList');
        students.forEach(student => {
            const studentDiv = document.createElement('div');
            studentDiv.textContent = `Name: ${student.name}, Roll No: ${student.rollNo}`;
            studentsList.appendChild(studentDiv);
        });
        console.log('Students loaded:', students);
        studentsList.appendChild(studentDiv);
    </script>
    </body>
</html>
